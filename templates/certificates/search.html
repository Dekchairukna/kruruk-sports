<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ค้นหาเกียรติบัตร</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light">
<div class="container py-5"><div class="card shadow-sm"><div class="card-body p-4"><h3>ค้นหาเกียรติบัตร KRURUK SPORTS</h3><form class="d-flex gap-2 my-3"><input class="form-control form-control-lg" name="q" value="{{ q }}" placeholder="พิมพ์ชื่อ-สกุล"><button class="btn btn-primary btn-lg">ค้นหา</button></form>
<table class="table"><thead><tr><th>ชื่อ</th><th>งาน</th><th>ประเภท</th><th></th></tr></thead><tbody>{% for cert in results %}<tr><td>{{ cert.full_name }}</td><td>{{ cert.event.name }}</td><td>{{ cert.award_text or cert.role_text or cert.recipient_type }}</td><td class="text-end"><a class="btn btn-sm btn-success" href="{{ url_for('certificate_print', recipient_id=cert.id) }}" target="_blank">ดาวน์โหลด/พิมพ์</a><a class="btn btn-sm btn-outline-primary" href="{{ url_for('certificate_verify', verify_code=cert.verify_code) }}" target="_blank">ตรวจสอบ</a></td></tr>{% else %}{% if q %}<tr><td colspan="4" class="text-center text-muted">ไม่พบข้อมูล</td></tr>{% endif %}{% endfor %}</tbody></table>
</div></div></div></body></html>
