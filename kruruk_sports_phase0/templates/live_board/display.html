<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Board · {{ event.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{--theme: {{ event.theme_color or '#2563eb' }};}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#1e3a8a 0,#020617 38%,#000 100%);color:#fff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden;}
    .board{height:100vh;display:flex;flex-direction:column;padding:1.5vw;gap:1vw;}
    .top{display:flex;align-items:center;justify-content:space-between;gap:1rem;}
    .brand{display:flex;align-items:center;gap:1rem;}
    .brand img{width:70px;height:70px;object-fit:contain;background:#fff;border-radius:18px;padding:6px;}
    .title{font-size:clamp(28px,3vw,58px);font-weight:900;letter-spacing:.3px;line-height:1.05;}
    .sub{font-size:clamp(14px,1.2vw,24px);color:#cbd5e1;}
    .clock{font-size:clamp(20px,2vw,38px);font-weight:800;background:rgba(255,255,255,.12);padding:.6rem 1rem;border-radius:18px;}
    .grid{flex:1;display:grid;grid-template-columns:1.1fr .9fr;gap:1vw;min-height:0;}
    .panel{background:rgba(15,23,42,.72);border:1px solid rgba(255,255,255,.13);border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,.35);padding:1.1vw;min-height:0;overflow:hidden;}
    .panel h2{font-size:clamp(22px,2vw,40px);font-weight:900;margin-bottom:.7rem;}
    .medal-row{display:grid;grid-template-columns:70px 1fr 90px 90px 90px;align-items:center;gap:.8rem;padding:.75rem 0;border-bottom:1px solid rgba(255,255,255,.10);font-size:clamp(17px,1.45vw,30px);}
    .medal-row .rank{font-size:1.25em;font-weight:900;text-align:center;}
    .team-chip{display:flex;align-items:center;gap:.7rem;font-weight:900;min-width:0;}
    .team-logo{width:42px;height:42px;object-fit:contain;background:#fff;border-radius:50%;padding:4px;}
    .dot{width:18px;height:18px;border-radius:50%;display:inline-block;box-shadow:0 0 0 4px rgba(255,255,255,.12)}
    .medal-count{text-align:center;font-weight:900;border-radius:16px;padding:.35rem .2rem;background:rgba(255,255,255,.08);}
    .champ{background:linear-gradient(135deg,rgba(250,204,21,.35),rgba(249,115,22,.18));border-color:rgba(250,204,21,.35);}
    .result-item,.schedule-item,.standing-block{padding:.65rem .75rem;margin-bottom:.55rem;border-radius:18px;background:rgba(255,255,255,.08);border-left:7px solid var(--theme);}
    .result-title{font-size:clamp(16px,1.35vw,28px);font-weight:850;}
    .result-detail{color:#cbd5e1;font-size:clamp(12px,1vw,19px);}
    .right-scroll{height:100%;overflow:hidden;}
    table{color:white!important;margin:0;font-size:clamp(12px,1vw,18px)}
    .marquee{height:54px;overflow:hidden;background:rgba(255,255,255,.12);border-radius:18px;display:flex;align-items:center;white-space:nowrap;}
    .marquee span{display:inline-block;padding-left:100%;animation:marquee 30s linear infinite;font-size:clamp(18px,1.6vw,32px);font-weight:800;}
    @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
    .fullscreen-hint{position:fixed;right:16px;bottom:12px;color:#94a3b8;font-size:14px;opacity:.65}
    @media(max-width:900px){body{overflow:auto}.board{height:auto}.grid{grid-template-columns:1fr}.medal-row{grid-template-columns:44px 1fr 58px 58px 58px}.clock{display:none}}
  </style>
</head>
<body>
  <div class="board">
    <div class="top">
      <div class="brand">
        <img id="eventLogo" src="" alt="" style="display:none">
        <div>
          <div class="title" id="eventName">{{ event.name }}</div>
          <div class="sub" id="eventSub">{{ event.location or '' }}</div>
        </div>
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </div>

    <div class="grid">
      <section class="panel" id="medalPanel">
        <h2>🏆 ตารางเหรียญรวม</h2>
        <div id="championBox" class="panel champ mb-3" style="display:none;padding:1rem"></div>
        <div id="medals"></div>
      </section>
      <section class="panel right-scroll">
        <h2>📣 อัปเดตสด</h2>
        <div id="results"></div>
        <h2 class="mt-3">🗓 โปรแกรมถัดไป</h2>
        <div id="schedule"></div>
        <h2 class="mt-3">📊 Round Robin</h2>
        <div id="standings"></div>
      </section>
    </div>

    <div class="marquee"><span id="marqueeText">{{ setting.marquee_text or '' }}</span></div>
  </div>
  <div class="fullscreen-hint">กด F11 เพื่อเต็มจอ · อัปเดตล่าสุด <span id="updatedAt">--:--:--</span></div>

<script>
const DATA_URL = "{{ url_for('event_live_board_data', event_id=event.id) }}";
let refreshMs = {{ (setting.refresh_seconds or 10) * 1000 }};
function tick(){ document.getElementById('clock').textContent = new Date().toLocaleTimeString('th-TH',{hour12:false}); }
setInterval(tick,1000); tick();
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
async function loadBoard(){
  const res = await fetch(DATA_URL + '?t=' + Date.now());
  const data = await res.json();
  refreshMs = (data.setting.refresh_seconds || 10) * 1000;
  document.getElementById('eventName').textContent = data.event.name || '';
  document.getElementById('eventSub').textContent = [data.event.year, data.event.location].filter(Boolean).join(' · ');
  if(data.event.logo){ const img=document.getElementById('eventLogo'); img.src=data.event.logo; img.style.display='block'; }
  document.getElementById('marqueeText').textContent = data.setting.marquee_text || '';
  document.getElementById('updatedAt').textContent = data.updated_at || '';
  const champ=document.getElementById('championBox');
  if(data.champion){ champ.style.display='block'; champ.innerHTML=`<div class="sub">แชมป์รวมขณะนี้</div><div style="font-size:clamp(26px,2.4vw,48px);font-weight:950">🥇 ${esc(data.champion.team)}</div>`; } else { champ.style.display='none'; }
  document.getElementById('medals').innerHTML = (data.medals||[]).map(r=>`
    <div class="medal-row">
      <div class="rank">${r.rank}</div>
      <div class="team-chip">${r.logo?`<img class="team-logo" src="${r.logo}">`:`<span class="dot" style="background:${r.color}"></span>`}<span>${esc(r.team)}</span></div>
      <div class="medal-count">🥇 ${r.gold}</div><div class="medal-count">🥈 ${r.silver}</div><div class="medal-count">🥉 ${r.bronze}</div>
    </div>`).join('') || '<div class="sub">ยังไม่มีเหรียญ</div>';
  document.getElementById('results').innerHTML = (data.latest_results||[]).slice(0,6).map(x=>`<div class="result-item" style="border-left-color:${x.team_color||'#2563eb'}"><div class="result-title">${esc(x.title)}</div><div class="result-detail">${esc(x.type)} · ${esc(x.competition)} · ${esc(x.detail)}</div></div>`).join('') || '<div class="sub">ยังไม่มีผลการแข่งขัน</div>';
  document.getElementById('schedule').innerHTML = (data.schedule||[]).slice(0,5).map(x=>`<div class="schedule-item"><div class="result-title"><span style="color:${x.color_a}">●</span> ${esc(x.team_a)} พบ ${esc(x.team_b)} <span style="color:${x.color_b}">●</span></div><div class="result-detail">${esc(x.competition)} · กลุ่ม ${esc(x.group)} · คู่ที่ ${x.match}</div></div>`).join('') || '<div class="sub">ยังไม่มีโปรแกรมถัดไป</div>';
  document.getElementById('standings').innerHTML = (data.standings||[]).slice(0,3).map(g=>`<div class="standing-block"><div class="fw-bold mb-1">${esc(g.competition)} · กลุ่ม ${esc(g.group)}</div><table class="table table-sm table-borderless"><tbody>${(g.rows||[]).map(r=>`<tr><td>${r.rank}</td><td><span style="color:${r.color}">●</span> ${esc(r.team)}</td><td>${r.points} pts</td><td>${r.goal_diff>0?'+':''}${r.goal_diff}</td></tr>`).join('')}</tbody></table></div>`).join('') || '<div class="sub">ยังไม่มีตาราง Round Robin</div>';
}
async function loop(){try{await loadBoard();}catch(e){console.error(e)} setTimeout(loop, refreshMs);} loop();
</script>
</body>
</html>
