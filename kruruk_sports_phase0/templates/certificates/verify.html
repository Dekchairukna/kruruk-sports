<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ตรวจสอบเกียรติบัตร</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light">
<div class="container py-5"><div class="card shadow-sm"><div class="card-body text-center p-5"><h2 class="text-success">ตรวจสอบเกียรติบัตรสำเร็จ</h2><h3 class="mt-3">{{ cert.full_name }}</h3><p class="lead">{{ cert.award_text or cert.role_text or cert.recipient_type }}</p><p>{{ cert.event.name }}</p><code>{{ cert.verify_code }}</code>{% if qr_data %}<div class="mt-4"><img src="{{ qr_data }}" width="150"></div>{% endif %}<div class="mt-4"><a class="btn btn-primary" href="{{ url_for('certificate_print', recipient_id=cert.id) }}">เปิดเกียรติบัตร</a></div></div></div></div>
</body></html>
